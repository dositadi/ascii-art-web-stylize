{{define "tabs"}}
{{range .AsciiArts}}
    <article id="ascii-{{.Id}}" class="hist-card" aria-label="Saved banner: Hello World">

      <div class="hist-card__header">

        <div class="hist-card__meta">
          <div class="hist-card__input-text">{{.InputText}}</div>
          <div class="hist-card__tags">
            <span class="hist-tag hist-tag--style">{{.Font}}</span>
            <span class="hist-tag hist-tag--size">Small</span>
          </div>
        </div>

        <span class="hist-card__date">{{.CreatedAt | Format}}</span>

        <div class="hist-card__actions">

          <button hx-post={{$.CopyOutputRoute}} hx-vals='{"input": "{{.InputText}}", "font": "{{.Font}}"}' hx-swap="outerHTML" hx-target="#copy-{{.Id}}" class="hbtn hbtn--copy" type="button" title="Copy to clipboard">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <rect x="4.5" y="4.5" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M4.5 8.5H3a1 1 0 01-1-1V3a1 1 0 011-1h4.5a1 1 0 011 1v1.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span id="copy-{{.Id}}">Copy</span>
          </button>

          <button class="hbtn hbtn--share" type="button" title="Share this banner">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <circle cx="10" cy="2.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="10" cy="10.5" r="1.5" stroke="currentColor" stroke-width="1.2"/>
              <circle cx="3"  cy="6.5"  r="1.5" stroke="currentColor" stroke-width="1.2"/>
              <path d="M4.4 7.3l4.2 2.4M8.6 3.3L4.4 5.7" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
            </svg>
            <span>Share</span>
          </button>

              <!-- Download dropdown -->
          <div class="dropdown">
            <input type="checkbox" class="dropdown__toggle" id="dl-toggle" />
            <label class="dropdown__btn" for="dl-toggle">
              <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                <path d="M6.5 2v7M3.5 6.5l3 3 3-3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 10.5h9" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              </svg>
              <span>Download</span>
              <svg class="dropdown__caret" width="10" height="6" viewBox="0 0 10 6" fill="none">
                <path d="M1 1l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </label>
            <div class="dropdown__menu">
              <button class="hbtn hbtn--download">
                <div class="dropdown__item-icon">
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <rect x="1.5" y="2.5" width="10" height="8" rx="1.5" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M1.5 8.5l3-2.5 2 2 2-3 3 3.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="4.5" cy="5" r="1" fill="currentColor"/>
                  </svg>
                </div>
                <div class="dropdown__item-meta">
                  <span class="dropdown__item-name">As Image</span>
                  <span class="dropdown__item-ext">.png</span>
                </div>
              </button>
              <button onclick='window.location.href="{{$.DownloadAscii}}?text={{.InputText}}&font={{.Font}}&id={{.Id}}"' class="hbtn hbtn--download">
                <div class="dropdown__item-icon">
                  <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
                    <path d="M3 1.5h5l3 3V11a1 1 0 01-1 1H3a1 1 0 01-1-1V2.5a1 1 0 011-1z" stroke="currentColor" stroke-width="1.2"/>
                    <path d="M8 1.5V5h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M4.5 7.5h4M4.5 9.5h2.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
                  </svg>
                </div>
                <div class="dropdown__item-meta">
                  <span class="dropdown__item-name">As Text</span>
                  <span class="dropdown__item-ext">.txt</span>
                </div>
              </button>
            </div>
          </div><!-- /.dropdown -->

          <a class="hbtn hbtn--forge" href="ascii.html" title="Re-open in Forge">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M2 6.5a4.5 4.5 0 119 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
              <path d="M9 3.5l2 3-3 .5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Re-forge</span>
          </a>

          <button hx-delete={{$.DeleteRoute}} hx-confirm="Are you sure you want to delete this?" hx-vals='{"id": "{{.Id}}"}' hx-target="#body" hx-swap="innerHTML" class="hbtn hbtn--delete" type="button" title="Delete banner">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M2.5 4h8M5 4V2.5h3V4M10 4l-.5 7a1 1 0 01-1 .9H4.5a1 1 0 01-1-.9L3 4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Delete</span>
          </button>

        </div>
      </div><!-- /.hist-card__header -->

      <!-- Terminal output panel -->
      <div class="hist-terminal">

        <div class="hist-terminal__bar">
          <div class="hist-terminal__bar-left">
            <div class="mini-dot mini-dot--red"></div>
            <div class="mini-dot mini-dot--amber"></div>
            <div class="mini-dot mini-dot--green"></div><!-- 
            <span class="hist-terminal__bar-title">Hello World · block · medium</span> -->
          </div>
          <div class="hist-terminal__bar-status">
            <div class="status-pip"></div>
            <span>Saved</span>
          </div>
        </div>

        <div class="hist-terminal__body">
          <div class="hist-output">
<pre>{{.AsciiText}}</pre>
          </div>
        </div>

      </div><!-- /.hist-terminal -->
    </article><!-- /.hist-card -->

    {{end}}

    <!-- ── Pagination ── -->
    <!--
      CSS-only pagination using anchor links.
      In production this is driven server-side.
      The prev/next links point to the appropriate
      server route (e.g. /history?page=2).
    -->
    <nav class="pagination" aria-label="History pagination">

      <span class="pagination__info">{{.DisplayFeedback}}</span>

      <div class="pagination__controls">                               

        <!-- Prev — disabled on page 1 -->
        <a hx-get={{.PrevPageRoute}} hx-swap="innerHTML" hx-target="#body" hx-push-url="true" class="page-btn" {{if .DisablePrev}} aria-disabled="true" {{else}} aria-disabled="false" {{end}} aria-label="Previous page">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M9 3L5 7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Prev
        </a>

        <a hx-get={{$.PageRoute}} hx-swap="innerHTML" hx-target="#body" hx-push-url="true" class="page-btn" {{if .DisableNext}} aria-disabled="true" {{else}} aria-disabled="false" {{end}} aria-label="Next page">
          Next
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <path d="M5 3l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </nav>
{{end}}
